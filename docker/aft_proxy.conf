# Common proxy headers for forwarding to the Bun backend.
# Included from /etc/nginx/conf.d/aft_proxy.conf at request time.
proxy_http_version 1.1;
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection        "";
proxy_buffering off;
proxy_read_timeout 300s;

# Reverse-proxy shared secret. The actual value is appended at runtime by
# /etc/nginx/conf.d/proxy_secret.conf written by the entrypoint script.
include /etc/nginx/conf.d/proxy_secret.conf;
