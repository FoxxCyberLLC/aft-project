###############################################################################
# AFT in-container nginx configuration
#
# - Listens on :80 (HTTP, redirect-to-HTTPS) and :443 (HTTPS).
# - Terminates TLS using the cert/key in /etc/aft/ssl.
# - Optional CAC client-cert verification using the DOD CA bundle in
#   /etc/aft/ssl/dod-ca-bundle.pem.
# - Forwards every request to the Bun app on 127.0.0.1:3001 with an
#   X-AFT-Proxy-Secret header that the Bun process verifies. The actual secret
#   value is written by docker/entrypoint.sh into /etc/nginx/conf.d/proxy_secret.conf.
###############################################################################

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/aft/nginx-error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 25M;

    log_format aft_combined '$remote_addr - $remote_user [$time_local] "$request" '
                            '$status $body_bytes_sent "$http_referer" '
                            '"$http_user_agent" verify=$ssl_client_verify';
    access_log /var/log/aft/nginx-access.log aft_combined;

    upstream aft_backend {
        server 127.0.0.1:3001;
        keepalive 32;
    }

    # ----- HTTP -> HTTPS redirect -----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Allow plain-HTTP healthcheck (used by docker HEALTHCHECK).
        location = /healthz {
            proxy_pass http://aft_backend;
            proxy_set_header Host $host;
            include /etc/nginx/conf.d/proxy_secret.conf;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- HTTPS server -----
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/aft/ssl/cert.pem;
        ssl_certificate_key /etc/aft/ssl/key.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 10m;
        ssl_session_cache shared:SSL:10m;

        # Optional CAC client certificate verification.
        # 'optional' lets browsers without a CAC reach /login while still
        # validating any cert that is presented. The application enforces
        # "must have CAC" on a per-route basis.
        ssl_client_certificate /etc/aft/ssl/dod-ca-bundle.pem;
        ssl_verify_client optional_no_ca;
        ssl_verify_depth 4;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        # Strip any X-Client-Cert-* headers a client might send. Only nginx is
        # allowed to populate these, and only after verifying the cert.
        proxy_set_header X-Client-Cert-Verify     "";
        proxy_set_header X-Client-Cert-Subject    "";
        proxy_set_header X-Client-Cert-Issuer     "";
        proxy_set_header X-Client-Cert-Serial     "";
        proxy_set_header X-Client-Cert-Fingerprint "";
        proxy_set_header X-Client-Cert-Not-Before "";
        proxy_set_header X-Client-Cert-Not-After  "";
        proxy_set_header X-Client-Cert-PEM        "";

        # CAC-protected endpoint: require a successfully verified client cert.
        location = /api/requestor/cac-info {
            if ($ssl_client_verify != SUCCESS) {
                return 401 "Client certificate required";
            }
            include /etc/nginx/conf.d/aft_proxy.conf;
            include /etc/nginx/conf.d/aft_cac.conf;
            proxy_pass http://aft_backend;
        }

        # Everything else
        location / {
            include /etc/nginx/conf.d/aft_proxy.conf;
            # Forward CAC headers ONLY when nginx has actually verified the cert.
            # When ssl_verify_client is 'optional_no_ca' and no cert was sent,
            # $ssl_client_verify == "NONE" and the variables below are empty.
            include /etc/nginx/conf.d/aft_cac.conf;
            proxy_pass http://aft_backend;
        }
    }
}
