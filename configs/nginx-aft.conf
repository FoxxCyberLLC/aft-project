# Main server with CAC client-certificate authentication
#
# IMPORTANT:
#   - The Bun backend must be bound to 127.0.0.1:3001 (loopback only) so the
#     only way to reach it is through this nginx instance.
#   - Set the X-AFT-Proxy-Secret header values below to a long random string
#     matching the AFT_PROXY_SHARED_SECRET environment variable that the Bun
#     process is started with. The Bun server rejects any request whose
#     X-AFT-Proxy-Secret header does not match.
#   - All X-Client-Cert-* and X-AFT-Proxy-Secret headers from external clients
#     are stripped at the start of every location block so they cannot be
#     spoofed.
server {
    listen 443 ssl;
    server_name aft.foxxcyber.com;

    # SSL Configuration
    ssl_certificate /etc/nginx/ssl/aft.foxxcyber.com.crt;
    ssl_certificate_key /etc/nginx/ssl/aft.foxxcyber.com.key;

    # SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;

    # Client Certificate Configuration for CAC.
    # 'optional' lets browsers without a CAC reach /login (so they can use the
    # username/password form) while still validating any cert that *is* sent.
    # The application enforces "must have CAC" on a per-route basis.
    ssl_client_certificate /home/foxx/aft-project/root-certs/DoD_Final_CA_Bundle.pem;
    ssl_verify_client optional;
    ssl_verify_depth 4;
    ssl_session_timeout 10m;
    ssl_session_cache shared:SSL:10m;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Logging
    access_log /var/log/nginx/aft-access.log;
    error_log /var/log/nginx/aft-error.log;

    # CAC-only endpoints: require a successfully verified client certificate
    location /api/requestor/cac-info {
        if ($ssl_client_verify != SUCCESS) {
            return 401 "Client certificate required";
        }

        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Trusted backend secret. Replace REPLACE_WITH_LONG_RANDOM_STRING with a
        # long random value and set the same value as AFT_PROXY_SHARED_SECRET in
        # the Bun process environment.
        proxy_set_header X-AFT-Proxy-Secret "REPLACE_WITH_LONG_RANDOM_STRING";

        # Forward CAC certificate information (only valid when verification succeeded)
        proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
        proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
        proxy_set_header X-Client-Cert-Fingerprint $ssl_client_fingerprint;
        proxy_set_header X-Client-Cert-Not-Before $ssl_client_v_start;
        proxy_set_header X-Client-Cert-Not-After $ssl_client_v_end;
        proxy_set_header X-Client-Cert-PEM $ssl_client_escaped_cert;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        proxy_set_header X-AFT-Proxy-Secret "REPLACE_WITH_LONG_RANDOM_STRING";

        # When ssl_verify_client is 'optional' and no cert was sent,
        # $ssl_client_verify == "NONE" and these variables are empty so the
        # backend correctly treats the user as having no CAC.
        proxy_set_header X-Client-Cert-Verify $ssl_client_verify;
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
        proxy_set_header X-Client-Cert-Serial $ssl_client_serial;
        proxy_set_header X-Client-Cert-Fingerprint $ssl_client_fingerprint;
        proxy_set_header X-Client-Cert-Not-Before $ssl_client_v_start;
        proxy_set_header X-Client-Cert-Not-After $ssl_client_v_end;
        proxy_set_header X-Client-Cert-PEM $ssl_client_escaped_cert;
    }
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name aft.foxxcyber.com;
    return 301 https://$server_name$request_uri;
}
